body:
  text: 罽賓國沙門佛陀波利奉詔譯如是我聞一時佛在王舍城耆闍崛山中與大比丘眾千二百五十人俱諸大菩薩萬二千人俱及諸天龍八部鬼神人非人等共會說法爾時世尊於其面門以佛神力放種種光其光五色青黃赤白一色之中有無量化佛能作佛事不可思議一一化佛有無量化菩薩讚頌佛德其光微妙難可測量上至非非想天下至阿鼻地獄徧帀八萬無不普照其中眾生遇佛光者自然念佛皆得初地方便三昧爾時眾中有新發意菩薩四十九人各欲從佛求長壽命無能發問時文殊師利菩薩知有所疑從座而起偏袒右肩合掌向佛而白佛言世尊我見眾中有所疑者今欲諮問唯願如來聽我所說佛言善哉善哉文殊師利汝有所疑當恣汝問文殊師利言世尊一切眾生於生死海造諸惡業從劫至劫輪迴六道縱得人身得短命報云何令其得壽命長滅諸惡業唯願世尊說長壽法佛言文殊汝大慈無量愍念罪苦眾生能問斯事我若具說一切眾生無能信受文殊師利重白佛言世尊一切種智天人之師普覆眾生是大慈父一音演說為大法王唯願世尊哀愍廣說佛便微笑普告大眾汝等諦聽當為汝說過去世時有世界名無垢清淨其土有佛號普光正見如來應供正徧知明行足善逝世間解無上士調御丈夫天人師佛世尊為無量無邊菩薩大眾恭敬圍繞其佛法中有一優婆夷名曰顛倒聞佛出世求欲出家悲號嗁哭白彼佛言世尊我有惡業求欲懺悔唯願世尊聽我具說我於昔時身懷胎孕足滿八月為家法故不貪兒息遂服毒藥殺子傷胎唯生死兒人形具足曾聞智人來謂我言若固傷胎此人現世得重病報壽命短薄墮阿鼻獄受大苦惱我今惟忖生大悲懼唯願世尊以慈悲力為我說法聽我出家令免斯苦爾時普光正見如來告顛倒言世間有五種懺悔難滅何等為五一者殺父二者殺母三者殺胎四者出佛身血五者破和合僧如此惡業罪難消滅爾時顛倒女人嗁號哽咽悲泣雨淚五體投地踠轉佛前而白佛言世尊大慈救護一切唯願世尊憐愍說法普光正見如來而重告言汝此惡業當墮阿鼻地獄無有休息熱地獄中暫遇寒風罪人暫寒寒地獄中暫遇熱風罪人暫熱無間地獄無有是處上火徹下下火徹上四面鐵牆上安鐵網東西四門有猛業火若有一人身亦徧獄身長八萬由旬若眾多人亦皆徧滿罪人徧身有大䥫蛇其毒苦痛甚於猛火或從口入從眼耳出周帀纏身從劫至劫罪人肢節常出猛火復有鐵鵶食其肉或有銅狗齩齧其身牛頭獄卒手執兵具發大惡聲如雷霹𮦷汝固殺胎當受此苦我若妄說不名為佛爾時顛倒女人聞佛說已悲咽躃地漸得穌息重白佛言世尊唯我一人受斯苦痛為復一切眾生皆受此苦普光如來告顛倒言汝子在胎人形具足在生熟二藏猶如地獄兩石壓身母若熱食如熱地獄母餐冷食如冷地獄終日苦痛在無明中汝更惡心固服毒藥汝此惡業自墮阿鼻地獄罪人是汝儔侶顛倒女人悲號重白我聞智者說如是言若造諸惡值佛及僧懺悔即滅設所命終入諸地獄造小福者還得生天於意云何願為我說普光正見如來告顛倒言若有眾生造諸重罪遇佛及僧至誠懺悔不復更作罪得消滅設所命終閻摩羅法王推問未定亡者生存六親眷屬請佛迎僧七日之內轉讀大椉方等經典燒香散花當有冥使檢覆善惡持五色神旛來至王所其旛前後歌詠讚歎出微妙聲柔和善順報閻王言此人積善或多亡者七日之內信邪倒見不信佛法大椉經典無慈孝心無慈悲心當有冥使持一黑旛其旛前後有無量惡鬼報閻王言此人積惡爾時閻羅法王見五色旛至心大歡喜高聲唱言願我罪身亦同汝善當此之時諸地獄中變為清泉刀山劒樹如蓮華生一切罪人咸受快樂若見黑旛閻王瞋怒惡聲震裂則將罪人付十八獄或上劒樹或刀山中或臥鐵牀或抱銅柱牛犂舌碓擣磑磨一日之中萬死萬生乃至展轉墮阿鼻獄受大苦痛從劫至劫無有休息所言未訖爾時空中有大惡聲喚言顛倒女人汝固殺胎受短命報我是鬼使故來追汝顛倒女人驚愕悲泣抱如來足唯願世尊為我廣說諸佛法藏滅罪因緣死當願畢爾時普光正見如來以佛威力報鬼使言無常殺鬼我今現欲為顛倒女說長壽命滅罪經且待須臾自當有證汝當諦聽我當為汝依過去千佛說諸佛祕法長壽命經令遣汝等遠離惡道顛倒當知此無常殺鬼情求難脫縱有無量百千金銀瑠璃硨磲赤珠瑪瑙而將贖命無能得免縱使國王王子大臣長者恃其勢力無常鬼至斷其寶命無一能免顛倒當知唯佛一字能免斯苦顛倒世有二人甚為希有如優曇花難可值遇一者不行惡法二者有罪即能懺悔如是之人甚為希有汝能至心於我懺悔我當為汝說長壽經令汝得免無常鬼苦顛倒當知未來世中五濁亂時若有眾生造諸重罪殺父害母毒藥殺胎破塔壞寺出佛身血破和合僧如是等罪五逆眾生若能受持此長壽經書寫讀誦若自書若遣人書猶尚罪滅得生梵天何況汝今親得見我善哉顛倒汝於無量曠劫種諸善根我今因汝善問慇懃懺悔即得轉于無上法輪能度無邊生死大海能與波旬共戰能摧波旬所立勝幢汝當諦聽我當依過去諸佛說十二因緣法無明緣行行緣識識緣名色名色緣六入六入緣觸觸緣受受緣愛愛緣取取緣有有緣生生緣老死憂悲苦惱無明滅即行滅行滅即識滅識滅即名色滅名色滅即六入滅六入滅即觸滅觸滅即受滅受滅即愛滅愛滅即取滅取滅即有滅有滅即生滅生滅即老死憂悲苦惱滅顛倒當知一切眾生不能見於十二因緣是故輪轉生死苦趣若有人見十二因緣者即是見法見法者即是見佛見佛者即是佛性何以故一切諸佛以此為性汝今得聞我說此十二因緣汝今以得佛性清淨堪為法器我當為汝說一實道汝當思惟守護一念一念者謂菩提心菩提心者名曰大椉諸佛菩薩為眾生故分別說三汝當念念常懃守護是菩提心勿令忘失縱有五陰四蛇三毒六賊一切諸魔來所侵嬈終不能變是菩提心因獲如是菩提心故身如金剛心如虗空難可沮壞因不壞故即得阿耨多羅三藐三菩提因得阿耨多羅三藐三菩提故常樂我淨具足而有即能遠離此無常殺鬼生老病死諸地獄苦佛於大眾中說是法時虗空鬼使作如是言我聞世尊說是法要地獄清淨為蓮華池我今現捨鬼境界鬼復答言顛倒汝得道時願見濟度爾時普光正見如來復告顛倒我已為汝說十二因緣竟更為汝說六波羅蜜汝當受持般若波羅蜜禪波羅蜜毗棃耶波羅蜜羼提波羅蜜尸波羅密檀波羅蜜此六波羅蜜汝當受持復次為汝說過去諸佛成佛之偈而說偈言諸行無常是生滅法生滅滅已寂滅為樂爾時顛倒女人聞法歡喜心豁明淨了了而悟以佛神力昇於虗空高七多羅樹安心靜坐爾時有一大姓婆羅門家中巨富無與等者忽患重病醫人瞻之須人眼睛合藥療愈時大長者即令僮僕行於衢路高聲唱言誰能忍痛賣雙眼睛當與千金庫藏珍寶任意所須終不悋惜顛倒女人聞此語已心大歡喜而自念言我今從佛聞長壽經滅除惡業心以了了悟諸佛性又得遠離無常殺鬼諸地獄苦我當碎身報佛慈恩高聲唱言我今秊至四十九歲從佛聞法名長壽經今欲碎身不惜軀命寫長壽經四十九卷欲令一切眾生受持讀誦我須賣眼將寫此經我眼無價任汝與直時天帝釋化作四十九人至顛倒所我願為汝書寫是經令汝見已當任賣眼時顛倒女慶幸無量削骨為筆身肉支解以血為墨供給書人於七日中書寫經竟諸人寫已白顛倒言向來所許兩眼睛時我等功畢願付我等持賣與婆羅門爾時顛倒即命旃陀羅者汝可為我剜出眼睛當令四十九人分汝一分時旃陀羅依法欲剜四十九人齊唱言希有希有不可思議此顛倒女削骨出血瘡穢能忍不惜身命書寫此經我等云何而取眼睛以慈悲心白顛倒女言我等終不貪汝眼睛賣婆羅門願汝得道當濟度我唯願我等在在處處當當來生常得與汝同共一處作善知識宣說是經救度一切罪苦眾生爾時難陀龍王等以大威力作諸幻術盜顛倒經於龍宮中受持供養時顛倒女於須臾頃忽不見經流淚哽咽而白佛言世尊我所碎身寫長壽經欲令流布一切眾生我今忽然不知所在我心悶濁愁毒難忍普光如來告顛倒言汝經是八部龍王請在龍宮受持供養汝當歡喜不須愁惱善哉顛倒汝當以此功德力故盡此壽已生於無色界天受諸快樂永不更作女人之身爾時顛倒女人白佛言世尊我之所願不願生天唯願生生世世常遇世尊佛心不退在在處處常為一切罪苦眾生宣揚此法普光告言汝應妄語顛倒又言我若妄語願我依前無常鬼逼我若實心願我身瘡對佛除愈于時顛倒以誓願力平復如故普光如來告顛倒言汝一心念佛從一佛國至一佛國汝即能見無量無邊諸佛世界文字語言不可宣說爾時顛倒於須臾閒得無生法忍三藐三菩提心文殊當知普光如來我身是也顛倒女人汝身是也四十九人新發意菩薩是也我於無量曠劫已來常以護身常與汝等宣說此經令一切眾生所有惡業聞此長壽命經半偈於耳皆得消滅今又更說爾時波斯匿王於其夜分在王宮中聞有女人高聲號哭哀慟難忍悲不自勝而自念言我之深宮曾無是事何故有是哀屈之聲於晨朝時即敕所司往城衢路尋求此女使奉王敕尋得將來其女驚愕悶絕王前王以冷水而洒其面漸漸得穌大王問言昨夜嗁哭審是汝不女人答言是我悲耳王曰何故怨哭誰之屈汝女人答言我之所恨實無人屈唯願大王聽我所說我秊十四𡣪於夫家經三十秊生三十子顏容殊妙頭紺青色脣赤如朱齒白如玉身體盛愛如春中花我之戀惜猶如髓腦亦如肝腸甚於性命此子長大不過一歲於秋夏時便棄我死其最後兒甚是我命今現垂困命將欲終我昨夜號哭因此悲耳爾時大王聞此語已深大愁惱所有百姓依因於我若不救護非名國王即集羣臣共相論議王有六臣一名見色二名聞聲三名香足四名辯才五名隨緣六名易染而白王言童子初生當作七星二十八宿神壇延命方免斯苦唯願大王告敕天下爾時有一智臣曾於無量佛所種諸善根名曰定慧前白大王大王當知六臣所言非能免苦今有大師字瞿曇氏號悉達多無師自悟今得成佛在耆闍崛山說長壽經唯願大王往彼聽受若聞此經半偈於耳百劫千生所有重罪無不消滅一切童子聞經於耳雖未悟解以經功德自然長壽波斯匿言我昔曾聞六師所言瞿曇沙門學日淺薄黃頷小兒其秊幼稺六師經中妖祥幻化瞿曇是也若有崇者多失正道爾時定慧以偈白王釋迦牟尼天人師曾於無量劫苦行今得成佛轉法輪還依過去諸佛說不違一切眾生願慈悲大力救羣迷見佛如龜值浮木亦如最妙優曇花唯願大王往聽法不信外道六師言爾時定慧說是偈已以神通力從地踊上昇於虗空高七多羅樹即於王前作諸呪術於一念頃令須彌山及大海水入於心中安然無礙波斯匿王見是事已歎言希有真善知識前禮定慧白定慧言汝師是誰定慧答言我師是釋迦牟尼佛今現在王舍大城耆闍崛山說長壽滅罪經王聞此語心大歡喜即以國事暫委定慧與無量眷屬大臣長者駟馬寶車前後圍遶并此女人及其童子齎持花鬘百種供養至王舍城耆闍崛山中除諸儀飾遶佛七帀合掌頂禮散花供養具以上事而白佛言爾時世尊告波斯匿王此女人者於過去世時身為後母心生嫉妒和合毒藥殺前妻兒三十之子此子被殺各發誓言願我生生世世常作其子便即分離令其苦切生大悲痛時此女人今來得聞我說長壽命經一偈於耳怨家債主從斯永絕爾時世尊告諸大眾童子受胎魔王波旬即放四大毒蛇六塵惡賊止住其身若一不調命根即斷我有陀羅尼呪善能增益諸童子壽若有患苦聞我此呪一經於耳無不除差能令惡鬼四散馳走即說呪曰波頭彌波頭彌提婢奚尼奚尼奚彌諸棃諸羅諸麗矦羅矦羅由麗由羅由麗波羅波麗聞制瞋迭頻迭般逝末迭遲那迦棃蘇波訶佛言是陀羅尼呪文句若善男子善女人受持讀誦為一切受胎出胎病患童子之所演說七日七夜燒香散花書寫供養至心聽受所有重病前身業障皆得消滅爾時醫王菩薩名曰耆婆前白佛言世尊我為大醫療治眾病諸小童子有九種病能短其命何者為九一者父母非時行於房室二者初產令血穢地地神不居惡鬼得便三者初產不去臍閒諸小毒蟲四者不以兜羅輭綿拭其胎中穢血五者殺生害命而為歡宴六者其母食一切諸襍冷果七者童子有病餧其襍肉八者初產子母未分令諸不祥見產生處未分解者能令母死已分解者令童子死何謂不祥若有人眼見一切死屍及諸變怪眼不淨故名曰不祥若以牛黃真珠光明砂蜜末微塵定童子心能免不祥九者夜行被惡鬼打之一切童子若能慎是九事終不至死爾時天魔波旬有佗心智在魔宮中知佛說此長壽滅罪護諸童子陀羅尼呪心大忿怒發大惡聲愁憂不樂魔有三女前白父王未審大王何故愁惱父王答言瞿曇沙門今在王舍大城耆闍崛山為無量無邊眾生說長壽經流布一切眾生得長壽樂侵我境界我惡心起我今欲將諸眷屬等一切魔兵而往討之縱使不能止得瞿曇我今威力止塞諸天及大眾耳不令聞佛說長壽經時魔三女以偈諫父天魔波旬有三女稽首前白父王言瞿曇沙門天人師非是魔力能禁止昔日在於菩提樹初坐吉祥法座時我等三女巧㛹妍諸天女中為第一百種姿態擬欲之菩薩都無染著意觀我三女如老姥今成正覺菩提師父王彎弓作恐怖諸兵器仗帀虗空菩薩觀如童子戲一無驚懼退敗心今日道成為法王唯願父王息惡意爾時魔王波旬聞女說偈將諸眷屬私自平章我當與汝同往佛所善巧方便而逡巡之詐受佛降令佛信用若得信者當作種種一切魔事而障此經即與眷屬同詣佛所遶佛七帀而白佛言世尊說法無疲勞耶我今將領諸魔眷屬來聽長壽命經為佛弟子唯願世尊不違我願爾時世尊呵責魔王汝在本宮心生忿怒設得來此詐作逡巡我之法中不容汝詐時魔波旬羞媿交集斂容無色而白佛言世尊是我愚計實行詐法唯願世尊以大慈悲恕我愆犯我今得聞長壽經護諸童子陀羅尼呪我發誓願若後末世有受持此經書寫讀誦所在之處我當擁護無令惡鬼伺求其便設使地獄若有罪人須臾之閒憶念此經我當以大神力取大海水灌注罪人令大地獄如蓮華池爾時復有飛騰羅剎食童子羅剎等而為上首與其同類諸眷屬等從空中下遶佛千帀白佛言世尊我於無量劫來受羅剎身我之眷屬如恒河沙各為飢餓之所逼切於四天下唯噉在胎及初生童子血肉我等眷屬伺候一切眾生夫婦交會食噉其精令無胎息或在胎中我亦隨入傷胎食血初生七日我等專伺其便斷其命根乃至十歲我等眷屬變作種種諸惡毒蟲入童子胎食其五臟所有精血能令小兒吐乳下痢或疳或瘧眼腫水腹乃至漸漸斷其命根我等今聞世尊說長壽滅罪護諸童子經奉世尊敕令我眷屬飢餓所逼不敢食噉佛告羅剎汝等當受我之禁戒令汝得捨此羅剎身生天受樂佛告大眾若有童子受患苦者令其慈母分乳微塵與虗空中施諸羅剎并清淨受持此長壽命滅罪陀羅尼經書寫讀誦病則除差時羅剎眾甚大歡喜而白佛言審得生天我等眷屬終不能侵諸童子乳乍食鐵丸終不能食諸童子血於佛滅後有能讀誦受持此經處者設有惡人惱是法師或有惡鬼惱諸童子我等當執佛金剛杵而衛護之不令惡鬼而得其便爾時一切諸天大王并其眷屬一切龍王一切夜叉王阿修羅王迦樓羅王緊那羅王摩睺羅伽王薜茘多王毗舍遮王富單那王乃至迦吒富單那等一切諸王各并眷屬禮拜於佛同心合掌作如是言世尊我等從今在在處處若有比丘比丘尼諸優婆塞優婆夷但有受持此長壽經書寫處者我等眷屬常當衛護我等諸王驅䇿惡鬼若有惡鬼惱諸眾生令患苦者若能清淨書持是經我等諸王禁攝諸鬼不令加害被橫死苦爾時牢固地天從座而起作如是言世尊若佛弟子受持此長壽滅罪護諸童子經者我等地天常出地味滋潤彼人令其身中增益壽命我等常以種種金銀種種資生種種糓米具足供給此信心人令無乏少身得安穩無有愁惱心常歡喜得好福田無令惡鬼斷其命根若諸童子生一七日我等地神當擁護之無令斷命爾時眾中金剛力士復白佛言世尊如來說此長壽命滅罪護諸童子陀羅尼呪經已諸大檀越并眷屬眾各各發心護持讀誦書寫是經供給所須無令乏少我聞大德婆伽婆說吉祥章句大神力呪若有眾生一聞於耳百劫千生終不短命得壽無量無有病苦雖有四魔不能忤亂增長壽命滿百二十不老不死不退不沒一切佛子苦患重病聞此呪者即免諸鬼之所奪命即說呪曰多地夜佗一旃達利二旃達囉毗提三旃達囉魔吽四旃達囉䟦帝五旃達囉不棃六旃達囉闍移七旃達囉底𠼝八旃達吠咩九旃突嘍十旃達囉婆囉吇十一旃達囉勿達𠼝十二旃達囉婆地移十三旃達囉婆咩十四旃達囉佉祇十五旃達囉盧寄十六藪婆呵十七佛言善哉善哉金剛力士汝今能說此護諸童子吉祥神呪汝當為一切眾生之大導師文殊當知如是神呪過去諸佛之所宣說建立守護善能增長人天壽命能除一切罪垢惡見能護一切持經之人延其壽命爾時世尊告文殊師利法王之子我滅度後濁惡世時若有比丘破我禁戒親比丘尼及諸處女并二沙彌飲酒食肉姦婬熾盛為諸白衣之所輕賤毀滅我法經營世俗不淨之事無慚愧心猶如木頭當知此等是五逆人非我弟子是魔眷屬名曰六師此比丘等於現世中得短命報比丘尼等亦復如是若能懺悔不更復作受持此經即得長壽復次文殊我滅度後濁惡世時若有菩薩誹謗佗人自讚其善方等經典不傳付人如是菩薩是魔伴侶非真菩薩若能至心受持此經書寫讀誦即得諸佛不壞常身復次文殊我滅度後濁惡世時若有國王殺父害母誅斬六親不依王法廣興兵甲侵討佗國忠諫之臣枉遭刑戮婬欲熾盛違先王法破塔壞寺焚燒經像水旱不調因王無道國界飢餓疾疫死亡如是國王現世短命死入地獄墮大阿鼻若能書寫是經流通供養至誠懺悔依先王法即得長命復次文殊我滅度後濁惡世時若有大臣及諸官屬身請天祿無慚愧心諂不忠專行矯詐賊臣危害國土不安設使臨人不行國法侵剋百姓恣意貪殘橫殺無辜取佗財寶輕慢經典魔障大乘如是等人現世短命墮阿鼻地獄無有出期若能懺悔受持此經書寫讀誦即得長命永守天祿復次文殊我滅度後濁惡世時有優婆塞及優婆夷信邪倒見不信正法大乘經典如是眾生縱有無量百千金銀而懷慳惜唯求財利不能布施救乏一切貧苦之者不能書寫十二部經受持讀誦求免無常惡道之苦如是之人宅舍虗耗竈下鳥現蛇入臥堂狗忽上舍鼠百種鳴諸野禽獸競來入宅百種魑魅名之為怪以見怪故心得煩惱因煩惱集得獲短命若能受持書寫是經流通讀誦即能摧破如是等怪而得長命復次文殊我滅度後濁惡世時一切眾生男女成就以憐愍故而得心病何以故或男成長被充兵役如是王法制不由己父母念之名為心病或女成長配𡣪佗門而被輕賤違夫婦道父母念之名為心病為心病故愁憂苦惱愁惱病集現世短命若能書寫受持此經得長壽命以經力故姻親和順心病消除復次文殊我滅度後濁惡世時一切眾生無慈悲心殺生害命食噉一切眾生十種身肉文殊當知如殺父母如食六親或因殺命而復傷胎為是事故現世短命設使夫婦交會之時被惡羅剎食噉其胎令無子息若能書寫受持是經即免斯苦復次文殊我滅度後濁惡世時一切眾生不知宿命暫得人身謂為快樂更相誹謗或恃權豪種種惡心規佗性命不信經典我慢大乘如是之人現世短命若能至心懺悔調柔其心書寫是經受持讀誦以善根力得長壽命設使病患終不橫死復次文殊我滅度後濁惡世時一切眾生或奉王敕或父母教而於佗國及險道處以商為業求諸珍寶為財利故我慢貢高圍棊六簙摴蒱投壺親近婬女交惡知識不用王敕及父母誡嗜酒耽婬喪身殞命設得財寶為酒迷濁不知道路通塞之處後被諸惡賊劫奪其財因以害命若能書寫是經廣發誓願所在之處惡賊退散生歡喜心諸惡毒獸不能嬈害身心安穩多獲寶貨以經力故得長壽命復次文殊我滅度後濁惡世時一切眾生以惡業故死入地獄從地獄出得畜生身設得人形六根不具聾盲瘖瘂癃殘背瘻受女人身不識經字設是男子為惡業故癡愚暗鈍不能轉讀此長壽經心生愁惱以愁惱故名為心病以心病故現世短命若能令善知識書寫是經自取而轉從初至末一心頂戴以至誠故功德無量如此惡業不更復受此人現世得長壽命復次文殊我滅度後濁惡世時若有眾生死亡之後從一七日乃至七七日所為亡者建造諸福功德七分亡者所得唯獲其一若能生在之時於七七日停止家事書寫是經香花供養請佛迎僧設生七齋所得功德如恒河沙此人現世得長壽命永離三塗諸惡道苦若已亡者緣身資產建福七分竝獲復次文殊我滅度後濁惡世時一切眾生不孝五逆無慈悲心而於父母無恩愛情而事六親爾時行道天王遶四天下種種音樂將諸眷屬於三齋月至閻浮提若有一切眾生橫被諸病行道天王為除惡鬼令得除愈眾生不孝嫉妒造惡行病鬼王即以惡氣噓而病之令得瘟疫一切重病若熱若冷虗勞下瘧邪魔鬼毒及惡癩病若能於歲一日燒香散花清淨身心書寫是經乃至七日請佛迎僧清齋讀誦以是善根終無疾疫無疾疫故得長壽命復次文殊我滅度後濁惡世時眾生薄福其劫欲盡七日竝照設無七日國王無道令天炎旱大地所有藥木叢林一切百穀甘蔗花菓將欲枯死若有國王一切眾生能受持讀誦此經典者難陀龍王及婆難陀龍王等憐愍眾生從大海水降注甘雨一切叢林百穀艸木滋榮眾生以此經力得長壽命復次文殊我滅度後濁惡世時一切眾生斗秤欺誑不義得財以其罪業死入地獄從地獄出受畜生身所謂牛驢象馬豬狗羊等一切禽獸蟁蝱蝨蟻若有菩薩摩訶薩以慈悲心於畜生等及蝱蟻前轉讀此經一聞於耳此經力故隨類皆解此等畜生捨此身已得生天樂若有菩薩無慈悲心不能廣說此經典者非佛弟子是魔伴侶復次文殊我滅度後五濁世時一切眾生心生欺慢不信經典毀呰我法若有說法之處無心聽學以此罪業現世短命墮諸地獄若有講說此長壽經處一切眾生能往聽者或能勸佗分坐與坐此人是佛棟梁得長壽樂不經惡道轉此經法清淨立壇隨室大小復次文殊我滅度後一切女人身懷胎娠殺一切命食諸鳥卵為無慈愍心現世得短命報臨生產難以產難故能斷其命或是怨家非善知識若能廣發誓願書寫是經即令易產無諸烖障子母安樂須男須女隨願得生爾時世尊告文殊師利菩薩我今說此長壽滅罪十二因緣佛性經時過去諸佛之所共說若有眾生受持讀誦多獲福利盡其壽命滿百二十臨捨化時不被風刀諸一切苦以佛性故得金剛不壞諸佛常身湛然清淨念念堅固常有菩薩一名觀世音二名大勢至椉五色雲六牙白象持蓮花臺迎念佛者生不動國自然快樂不經八難文殊當知愚癡眾生不覺不知壽命短薄如石火光如水上泡如電光出云何於中不驚不懼云何於中廣貪財利云何於中耽婬嗜酒云何於中生嫉妒心如此生死流浪大海唯有諸佛菩薩能到彼岸凡夫眾生定當淪沒無常殺鬼來無時節縱有無量無邊金銀財寶情求贖命無有是處眾生當知須觀此身而生念言是身如四毒蛇常為無量諸蟲之所唼食是身臭穢貪欲獄縛是身可惡猶如死狗是身不淨九孔常流是身如城羅剎處內是身不久當為烏鵲餓狗之所食噉須捨穢身求菩提心當觀此身捨命之時白汗流出兩手橫空楚痛難忍命根盡時一日二日至于五日膨脹青瘀膿汗流出父母妻子而不喜見乃至身骨散在於地脚骨異處髆骨䯗骨腰骨肋骨脊骨頂骨髑髏各各異處身肉腸胃肝腎肺臟為諸蟲藪云何於中橫生有我生存之時金銀珍寶錢財庫藏何關我事若有眾生須免此苦當須不惜國城妻子頭目髓腦書寫是經受持讀誦諸佛祕藏十二因緣流通供養念念成就當得三藐三菩提心難可沮壞終不中夭被橫死逼佛於大眾中說此十二因緣佛性法時一切大會比丘比丘尼優婆塞優婆夷天龍八部人非人等波斯匿王并其眷屬數如恒沙皆得三藐三菩提心無生法忍歎未曾有一心頂禮歡喜奉持
